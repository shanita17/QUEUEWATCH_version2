<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — QueueWatch SA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav>
      <div
        class="logo"
        onclick="window.location = 'index.html'"
        style="cursor: pointer"
      >
        <div class="logo-dot"></div>
        QueueWatch<span style="color: var(--accent)">SA</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Branches</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <div style="display: flex; gap: 0.6rem">
        <a
          href="profile.html"
          class="btn btn-outline"
          style="border-color: var(--accent); color: var(--accent)"
          >My Profile</a
        >
        <a href="index.html" class="btn btn-primary">Logout</a>
      </div>
    </nav>

    <div class="main" style="padding-top: 2rem">
      <a href="index.html" class="back-link">← Back to branches</a>

      <!-- PROFILE HEADER -->
      <div
        style="
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 2rem;
          margin-bottom: 1.5rem;
          display: flex;
          align-items: center;
          gap: 1.5rem;
          flex-wrap: wrap;
        "
      >
        <div
          id="header-avatar"
          style="
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(245, 197, 24, 0.15);
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent);
            flex-shrink: 0;
          "
        >
          DS
        </div>
        <div style="flex: 1">
          <h2 id="header-name" style="font-size: 1.5rem; font-weight: 800">DevSquad</h2>
          <div
            id="header-email"
            style="
              color: var(--muted);
              font-family: &quot;Space Mono&quot;, monospace;
              font-size: 0.78rem;
              margin-top: 0.3rem;
            "
          >
            contact@devsquad.co.za
          </div>
          <div
            style="
              display: flex;
              gap: 0.5rem;
              margin-top: 0.6rem;
              flex-wrap: wrap;
            "
          >
            <span
              id="header-role-badge"
              style="
                background: rgba(245, 197, 24, 0.1);
                border: 1px solid rgba(245, 197, 24, 0.3);
                color: var(--accent);
                font-size: 0.7rem;
                font-family: &quot;Space Mono&quot;, monospace;
                padding: 0.2rem 0.6rem;
                border-radius: 4px;
              "
              >MEMBER</span
            >
            <span
              style="
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--muted);
                font-size: 0.7rem;
                font-family: &quot;Space Mono&quot;, monospace;
                padding: 0.2rem 0.6rem;
                border-radius: 4px;
              "
              >Joined Apr 2026</span
            >
          </div>
        </div>
        <a href="report.html" class="btn btn-primary">+ Submit Report</a>
      </div>

      <!-- STATS -->
      <div class="admin-stats" style="margin-bottom: 1.5rem">
        <div class="admin-stat-card">
          <div id="stat-reports-count" class="admin-stat-num">—</div>
          <div class="admin-stat-label">Reports Submitted</div>
        </div>
        <div class="admin-stat-card">
          <div id="stat-accuracy-rate" class="admin-stat-num" style="color: var(--quiet)">—</div>
          <div class="admin-stat-label">Accuracy Rate</div>
        </div>
        <div class="admin-stat-card">
          <div id="stat-branches-count" class="admin-stat-num">—</div>
          <div class="admin-stat-label">Branches Covered</div>
        </div>
      </div>

      <div class="detail-grid">
        <!-- MY REPORTS -->
        <div>
          <div class="section-title" style="margin-bottom: 1rem">
            // My Recent Reports
          </div>
          <div id="user-reports-list">
            <!-- Dynamic reports injected here by profile.js -->
            <div style="text-align: center; padding: 2rem; color: var(--muted);">Loading your reports...</div>
          </div>
        </div>

        <!-- SETTINGS -->
        <div>
          <div class="section-title" style="margin-bottom: 1rem">
            // Account Settings
          </div>
          <div
            style="
              background: var(--surface);
              border: 1px solid var(--border);
              border-radius: 12px;
              overflow: hidden;
            "
          >
            <div class="form-group" style="padding: 1.2rem 1.2rem 0">
              <label class="form-label">Full Name</label>
              <input id="profile-name" class="form-control" type="text" placeholder="Your Name" />
            </div>
            <div class="form-group" style="padding: 0 1.2rem">
              <label class="form-label">Email</label>
              <input
                id="profile-email"
                class="form-control"
                type="email"
                placeholder="your.email@example.com"
              />
            </div>
            <div class="form-group" style="padding: 0 1.2rem">
              <label class="form-label">New Password</label>
              <input
                id="profile-password"
                class="form-control"
                type="password"
                placeholder="Leave blank to keep current (Min. 8 chars, mix of A-Z, a-z, 0-9, special)"
              />
            </div>
            <div style="padding: 0 1.2rem 1.2rem">
              <button
                id="profile-save-btn"
                class="btn btn-primary"
                style="width: 100%"
              >
                Save Changes
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="js/nav-auth.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
