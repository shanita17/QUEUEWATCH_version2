<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Detail — QueueWatch SA</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav>
  <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">
    <div class="logo-dot"></div>
    QueueWatch<span style="color:var(--accent)">SA</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="branches.html">Branches</a></li>
    <li><a href="admin.html">Admin</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div style="display:flex;gap:0.6rem">
    <a href="auth.html" class="btn btn-outline">Login</a>
    <a href="auth.html" class="btn btn-primary">Register</a>
  </div>
</nav>

<div class="main" style="padding-top:2rem">
  <a href="index.html" class="back-link">← Back to all branches</a>

  <div class="branch-hero" id="branchHero">
    <div>
      <div class="branch-type" id="detailType" style="margin-bottom:0.6rem"></div>
      <h2 id="detailName" style="font-size:clamp(1.6rem,4vw,2.8rem);font-weight:800;letter-spacing:-0.02em"></h2>
      <div style="display:flex;align-items:center;gap:0.8rem;margin-top:0.8rem;flex-wrap:wrap">
        <div class="status-badge" id="detailBadge"></div>
        <span style="font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted)" id="detailUpdated"></span>
      </div>
    </div>
    <div class="wait-hero-box" id="waitBox">
      <div class="wait-number" id="detailWaitNum" style="font-size:3.5rem"></div>
      <div class="wait-unit" id="detailWaitUnit" style="font-size:0.9rem;margin-top:0.3rem"></div>
      <div style="font-size:0.7rem;color:var(--muted);margin-top:0.4rem;font-family:'Space Mono',monospace">avg today</div>
    </div>
  </div>

  <div class="detail-grid">
    <div>
      <div class="section-header" style="margin-bottom:1rem">
        <span class="section-title">// Recent Reports</span>
        <a href="report.html" class="btn btn-primary" style="font-size:0.8rem;padding:0.4rem 0.9rem;text-decoration:none">+ Add Report</a>
      </div>
      <div id="reportsList">
        <p style="color:var(--muted);font-family:'Space Mono',monospace;font-size:0.8rem">Loading reports...</p>
      </div>
    </div>

    <div>
      <div class="section-title" style="margin-bottom:0.8rem">// Location</div>
      <div class="map-placeholder" id="mapContainer">
        <div class="map-pin">📍</div>
        <div style="font-weight:700;margin-bottom:0.3rem" id="mapBranchName"></div>
        <div style="font-size:0.8rem;color:var(--muted)" id="mapAddress"></div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.3rem;font-family:'Space Mono',monospace">Loading map...</div>
      </div>

      <div class="section-title" style="margin:1.5rem 0 0.8rem">// Today's Summary</div>
      <div class="summary-card">
        <div class="summary-row"><span>Total reports</span><strong id="sumReports">—</strong></div>
        <div class="summary-row"><span>Peak time</span><strong>08:00 – 10:00</strong></div>
        <div class="summary-row"><span>Avg wait today</span><strong id="sumAvg">—</strong></div>
        <div class="summary-row"><span>Last update</span><strong id="sumLast">—</strong></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/script.js"></script>
<script>
  const SM = {
    "Quiet":          { cls:"status-quiet",   cssVar:"var(--quiet)"   },
    "Busy":           { cls:"status-busy",    cssVar:"var(--busy)"    },
    "Very Busy":      { cls:"status-vbusy",   cssVar:"var(--vbusy)"   },
    "System Offline": { cls:"status-offline", cssVar:"var(--offline)" },
  };

  function wl(w) {
    if (!w || w===0) return {num:'—',unit:'no reports yet'};
    if (w<60) return {num:w,unit:'min wait'};
    const h=(w/60).toFixed(1).replace('.0','');
    return {num:h,unit:h==='1'?'hr wait':'hrs wait'};
  }

  function fmt(d){ if(!d) return ''; const x=new Date(d); return x.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}); }

  const raw    = localStorage.getItem('selectedBranch');
  const branch = raw ? JSON.parse(raw) : {id:1,name:"Home Affairs Johannesburg Large Office",type:"Home Affairs",status:"System Offline",wait:0,reports:0,updated:"—"};

  const s = SM[branch.status]||SM["System Offline"];
  const w = wl(branch.wait);

  document.getElementById('detailName').textContent     = branch.name;
  document.getElementById('detailType').textContent     = branch.type;
  document.getElementById('detailUpdated').textContent  = 'Last updated ' + branch.updated;
  document.getElementById('detailWaitNum').textContent  = w.num;
  document.getElementById('detailWaitUnit').textContent = w.unit;
  document.getElementById('mapBranchName').textContent  = branch.name;
  document.getElementById('mapAddress').textContent     = branch.address||'';
  document.getElementById('sumReports').textContent     = branch.reports;
  document.getElementById('sumAvg').textContent         = w.num+' '+w.unit;
  document.getElementById('sumLast').textContent        = branch.updated;

  function showMap() {
    const container = document.getElementById('mapContainer');
    
    // The database now stores the exact Google Maps business names!
    // We only use the name (no address) so Google Maps forces the rich Business Profile card to open directly.
    const query = encodeURIComponent(`${branch.name}`);

    container.style.border = 'none';
    container.innerHTML = `<iframe 
      width="100%" 
      height="100%" 
      style="border:0; border-radius:24px;" 
      loading="lazy" 
      allowfullscreen 
      src="https://maps.google.com/maps?q=${query}&z=16&output=embed">
    </iframe>`;
  }
  
  // Auto-load map on page load
  showMap();

  const badge = document.getElementById('detailBadge');
  badge.textContent = branch.status;
  badge.className   = 'status-badge '+s.cls;
  document.getElementById('waitBox').style.setProperty('--status-color', s.cssVar);
  document.getElementById('detailWaitNum').style.color = s.cssVar;

  async function loadReports() {
    const list = document.getElementById('reportsList');
    try {
      const res     = await fetch('/api/reports/branch/'+branch.id);
      const reports = await res.json();
      if (!reports.length) {
        list.innerHTML = '<p style="color:var(--muted);font-family:\'Space Mono\',monospace;font-size:0.8rem">No reports yet. Be the first to report!</p>';
        return;
      }
      list.innerHTML = '';
      reports.forEach(r => {
        const rs  = SM[r.Status]||SM["System Offline"];
        const wr  = wl(r.WaitMinutes);
        const div = document.createElement('div');
        div.className = 'report-item';
        div.innerHTML = `
          <div class="report-item-top">
            <div>
              <span class="report-user">${r.UserName}</span>
              <span class="report-time">${fmt(r.CreatedAt)}</span>
            </div>
            <div class="status-badge ${rs.cls}" style="font-size:0.65rem">${r.Status}</div>
          </div>
          <div style="display:flex;align-items:baseline;gap:0.3rem;margin:0.5rem 0">
            <span style="font-size:1.4rem;font-weight:800;color:${rs.cssVar}">${wr.num}</span>
            <span style="font-size:0.75rem;color:var(--muted);font-family:'Space Mono',monospace">${wr.unit}</span>
          </div>
          ${r.Notes?`<div class="report-note">"${r.Notes}"</div>`:''}
        `;
        list.appendChild(div);
      });
    } catch(err) {
      list.innerHTML = '<p style="color:var(--muted);font-size:0.8rem">Could not load reports.</p>';
    }
  }
  loadReports();
</script>
  <script src="js/nav-auth.js"></script>
  </body>
</html>
