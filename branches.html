<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Branches — QueueWatch SA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div
        class="logo"
        onclick="window.location = 'index.html'"
        style="cursor: pointer"
      >
        <div class="logo-dot"></div>
        QueueWatch<span style="color: var(--accent)">SA</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="branches.html" class="active">Branches</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div style="display: flex; gap: 0.6rem">
        <a href="auth.html" class="btn btn-outline">Login</a>
        <a href="auth.html" class="btn btn-primary">Register</a>
      </div>
    </nav>

    <div class="main" style="padding-top: 2.5rem">
      <div class="hero-tag" style="margin-bottom: 1rem">🏢 ALL BRANCHES</div>
      <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem">
        Browse All Branches
      </h2>
      <p style="color: var(--muted); margin-bottom: 2rem">
        Find any public service office and check current queue conditions.
      </p>

      <div
        style="
          display: flex;
          gap: 0.8rem;
          margin-bottom: 1.5rem;
          flex-wrap: wrap;
        "
      >
        <input
          class="search-input"
          type="text"
          id="searchInput"
          placeholder="Search by name or area…"
          oninput="filterAll()"
          style="max-width: 380px"
        />
        <select
          class="form-select"
          id="typeFilter"
          onchange="filterAll()"
          style="max-width: 200px"
        >
          <option value="">All Types</option>
          <option>Home Affairs</option>
          <option>SASSA</option>
          <option>Clinic</option>
          <option>Licensing</option>
        </select>
        <select
          class="form-select"
          id="statusFilter"
          onchange="filterAll()"
          style="max-width: 200px"
        >
          <option value="">All Statuses</option>
          <option>Quiet</option>
          <option>Busy</option>
          <option>Very Busy</option>
          <option>System Offline</option>
        </select>
      </div>

      <div class="branch-grid" id="branchGrid"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🔍</div>
        <p>No branches match your filters.</p>
      </div>
    </div>

    <button class="fab" onclick="window.location = 'report.html'">
      + Report Queue
    </button>
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
    <script>
      // branches.html has its own filter logic with type + status dropdowns
      function filterAll() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const type = document.getElementById("typeFilter").value;
        const status = document.getElementById("statusFilter").value;

        const filtered = branches.filter(
          (b) =>
            (!type || b.type === type) &&
            (!status || b.status === status) &&
            (b.name.toLowerCase().includes(q) ||
              b.type.toLowerCase().includes(q)),
        );

        // Reuse renderCards from script.js — it already has onclick built in
        renderCards(filtered);
      }

      // Override the auto-init from script.js with our own
      filterAll();
    </script>
  </body>
</html>
